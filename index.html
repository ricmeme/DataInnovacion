<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta API DataInnovación</title>
  <!-- DataTables CSS -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.dataTables.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/colreorder/1.6.2/css/colReorder.dataTables.min.css">
    <!-- ColResize plugin CSS to allow column resizing -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/datatables.net-colresize-unofficial@1.6.1/jquery.dataTables.colResize.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    h1 {
      margin-bottom: 20px;
    }
    form {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      background: #f5f5f5;
      padding: 15px;
      border-radius: 5px;
    }
    form div {
      display: flex;
      flex-direction: column;
      min-width: 150px;
    }
    label {
      font-weight: bold;
    }
    input, select {
      padding: 4px;
      font-size: 14px;
    }
    #loader {
      display: none;
      margin-bottom: 10px;
    }
    table.dataTable thead th, table.dataTable thead td {
      white-space: nowrap;
    }

    /* Evitar que las celdas del cuerpo se dividan y forzar el scroll horizontal */
    table.dataTable tbody td {
      white-space: nowrap;
    }

    /* Asegurar que el contenedor de scroll horizontal muestre la barra */
    .dataTables_wrapper .dataTables_scrollBody {
      overflow-x: auto !important;
    }

    /* Estilo de controles DataTables: coloca los botones y el menú de longitud a la izquierda
       y el cuadro de búsqueda a la derecha. Esto mantiene juntos los controles de
       columna/longitud y separa el buscador. */
    .dataTables_wrapper .dt-buttons {
      float: left;
      margin-right: 10px;
    }
    .dataTables_wrapper .dataTables_length {
      float: left;
      margin-right: 10px;
    }
    .dataTables_wrapper .dataTables_filter {
      float: right;
      text-align: right;
    }

    /* Controles para guardar/cargar diseños */
    #designControls {
      margin-bottom: 10px;
    }
    #designControls input,
    #designControls select,
    #designControls button {
      margin-right: 5px;
    }
  </style>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <!-- DataTables JS -->
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.colVis.min.js"></script>
  <!-- DataTables Buttons HTML5 export (Excel) -->
  <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
  <!-- JSZip for Excel export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
  <script src="https://cdn.datatables.net/colreorder/1.6.2/js/dataTables.colReorder.min.js"></script>
  <!-- ColResize plugin JS to enable column resizing -->
  <script src="https://cdn.jsdelivr.net/npm/datatables.net-colresize-unofficial@1.6.1/jquery.dataTables.colResize.js"></script>
</head>
<body>
  <h1>Consulta de proyectos API DataInnovación</h1>
  <form id="filtersForm">
    <div>
      <label for="codigo">Código de proyecto</label>
      <input type="text" id="codigo" name="codigo" placeholder="Ej. 19CV-12345">
    </div>
    <div>
      <label for="rut_beneficiario">RUT Beneficiario</label>
      <input type="text" id="rut_beneficiario" name="rut_beneficiario" placeholder="Ej. 12345678K">
    </div>
    <div>
      <label for="tipo_intervencion">Tipo intervención</label>
      <select id="tipo_intervencion" name="tipo_intervencion">
        <option value="">--Cualquiera--</option>
        <option value="Ley">Ley</option>
        <option value="Subsidio">Subsidio</option>
      </select>
    </div>
    <div>
      <label for="estado_data">Estado data</label>
      <select id="estado_data" name="estado_data">
        <option value="">--Cualquiera--</option>
        <option value="Vigente">Vigente</option>
        <option value="Finalizado">Finalizado</option>
      </select>
    </div>
    <div>
      <label for="sostenible">Sostenible</label>
      <select id="sostenible" name="sostenible">
        <option value="">--Cualquiera--</option>
        <option value="Sí">Sí</option>
        <option value="No">No</option>
      </select>
    </div>
    <div>
      <label for="anio_desde">Año adjudicación desde</label>
      <input type="number" id="anio_desde" name="anio_desde" min="2010" max="2100" placeholder="Ej. 2010">
    </div>
    <div>
      <label for="anio_hasta">Año adjudicación hasta</label>
      <input type="number" id="anio_hasta" name="anio_hasta" min="2010" max="2100" placeholder="Ej. 2021">
    </div>
      <!-- Eliminamos los filtros de región de ejecución y sector económico del panel superior.
           Las columnas correspondientes seguirán mostrándose en la tabla y podrán ser
           filtradas desde los selectores en el encabezado de cada columna una vez cargados
           los datos. -->
    <div style="align-self: flex-end;">
      <button type="submit">Cargar datos</button>
    </div>
  </form>
  <div id="loader">Cargando datos...</div>
  <div id="tableContainer"></div>
  <script>
    // Token público proporcionado por DataInnovación
    const API_TOKEN = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJodHRwczpcL1wvZGF0YUlubm92YXRpb24uY2wiLCJuYW1lIjoicHVibGljIGFwaUtleSJ9.Ofu3LI0z8uCNYTbZyXd9BeY0sWIDt2NzUBwnHxTtdsA';
    const API_URL = 'https://www.datainnovacion.cl/api/v1/proyectos';

    // Listas estáticas de regiones y sectores económicos basadas en el catálogo oficial de CorfoConecta.
    // Estas listas permiten precargar los selectores antes de obtener datos para que el usuario filtre
    // sin necesidad de descargar todo el portafolio. Si en el futuro aparecen valores nuevos en la
    // base de datos, se combinarán con estas listas al renderizar la tabla.
    const REGION_LIST = [
      'Arica y Parinacota',
      'Tarapacá',
      'Antofagasta',
      'Atacama',
      'Coquimbo',
      'Valparaíso',
      'Metropolitana de Santiago',
      'Libertador General Bernardo O’Higgins',
      'Maule',
      'Ñuble',
      'La Araucanía',
      'Biobío',
      'Los Ríos',
      'Los Lagos',
      'Aysén del General Carlos Ibáñez del Campo',
      'Magallanes y la Antártica Chilena',
      'Internacional'
    ];
    const SECTOR_LIST = [
      'Agrícola',
      'Agroindustria',
      'Alimentos',
      'Biotecnología y salud',
      'Comercio y retail',
      'Construcción',
      'Energía',
      'Forestal',
      'Manufactura',
      'Medio ambiente',
      'Minería',
      'Otro',
      'Pesca y acuicultura',
      'Tics',
      'Transversal'
    ];

    // Función para rellenar un selector con valores estáticos. Siempre incluye la opción por defecto.
    function fillSelectWithValues(selectElem, values) {
      // Vaciar el selector conservando la opción predeterminada
      selectElem.innerHTML = '';
      const defaultOption = document.createElement('option');
      defaultOption.value = '';
      defaultOption.textContent = '--Cualquiera--';
      selectElem.appendChild(defaultOption);
      values.forEach(val => {
        const opt = document.createElement('option');
        opt.value = val;
        opt.textContent = val;
        selectElem.appendChild(opt);
      });
    }

    // Al cargar la página no es necesario precargar los selectores de región y sector
    // porque esos filtros se han eliminado.  La tabla incluirá selectores por columna
    // para filtrar valores una vez se muestren los datos.
    document.addEventListener('DOMContentLoaded', () => {
      // ninguna acción necesaria aquí
    });

    let dataTable;

    document.getElementById('filtersForm').addEventListener('submit', function(event) {
      event.preventDefault();
      fetchData();
    });

    async function fetchData() {
      const loader = document.getElementById('loader');
      loader.style.display = 'block';
      const params = new URLSearchParams();
      // Build query parameters based on filled inputs
      const codigo = document.getElementById('codigo').value.trim();
      const rut = document.getElementById('rut_beneficiario').value.trim();
      const tipo = document.getElementById('tipo_intervencion').value;
      const estado = document.getElementById('estado_data').value;
      const sostenible = document.getElementById('sostenible').value;
      const anioDesde = document.getElementById('anio_desde').value;
      const anioHasta = document.getElementById('anio_hasta').value;
      // Establecer un límite por defecto alto para obtener la mayoría de los registros.
      const DEFAULT_LIMIT = 10000;
      if (codigo) params.append('filter[codigo]', codigo);
      if (rut) params.append('filter[rut_beneficiario]', rut);
      if (tipo) params.append('filter[tipo_intervencion]', tipo);
      if (estado) params.append('filter[estado_data]', estado);
      if (sostenible) params.append('filter[sostenible]', sostenible);
      if (anioDesde && anioHasta) {
        // Provide range as comma separated
        params.append('filter[año_adjudicacion]', `${anioDesde},${anioHasta}`);
      } else if (anioDesde) {
        params.append('filter[año_adjudicacion]', anioDesde);
      } else if (anioHasta) {
        params.append('filter[año_adjudicacion]', `2010,${anioHasta}`);
      }
      // Siempre incluir un límite alto; la API lo acepta como parámetro opcional y evita
      // retornar un número excesivo de registros sin necesidad. Ajuste según necesidad.
      params.append('limit', DEFAULT_LIMIT);
      // Nota: No agregamos filtros de región ni sector a la consulta de la API porque
      // esos parámetros no son soportados oficialmente por el servicio y causan errores.
      // En su lugar, estos filtros se aplican posteriormente en la tabla a nivel de cliente.

      // Build full URL once
      const queryString = params.toString();
      const apiRequestURL = `${API_URL}?${queryString}`;
      const headers = {
        'Accept': 'application/json',
        'Authorization': API_TOKEN
      };
      // Candidate endpoints to try in order. Some proxies are used to work around CORS issues.
      const candidateUrls = [
        apiRequestURL,
        // CORSProxy.io proxies the request and usually passes headers
        'https://corsproxy.io/?' + encodeURIComponent(apiRequestURL),
        // AllOrigins returns raw contents of remote URL
        'https://api.allorigins.win/raw?url=' + encodeURIComponent(apiRequestURL)
      ];
      let fetched = false;
      for (const url of candidateUrls) {
        try {
          const response = await fetch(url, { headers });
          if (response.ok) {
            const data = await response.json();
            renderTable(data);
            fetched = true;
            break;
          }
        } catch (e) {
          // Continue to next candidate if network error occurs
        }
      }
      if (!fetched) {
        alert('No se pudo obtener datos de la API. Intenta ajustar los filtros o verifica la conectividad.');
      }
      loader.style.display = 'none';
    }

    function renderTable(data) {
      const container = document.getElementById('tableContainer');
      container.innerHTML = '';
      if (!data || data.length === 0) {
        container.innerHTML = '<p>No se encontraron resultados con los filtros aplicados.</p>';
        return;
      }
      // Mapping of API field keys to descriptive column titles (Spanish). Extend as needed.
      const columnDescriptions = {
        codigo: 'Código de proyecto',
        rut_beneficiario: 'RUT Beneficiario',
        razon_social_beneficiario: 'Beneficiario',
        tipo_intervencion: 'Tipo de intervención',
        estado_data: 'Estado de los datos',
        sostenible: '¿Sostenible?',
        año_adjudicacion: 'Año de adjudicación',
        anio_adjudicacion: 'Año de adjudicación',
        region_ejecucion: 'Región de ejecución',
        sector_economico: 'Sector económico',
        foco_apoyo: 'Foco de apoyo',
        programa: 'Programa',
        nombre_proyecto: 'Nombre del proyecto',
        comuna_ejecucion: 'Comuna de ejecución',
        region: 'Región',
        sector: 'Sector'
      };
      // Determine columns dynamically but set titles using descriptive names when available
      const columns = Object.keys(data[0]).map(key => ({ title: columnDescriptions[key] || key, data: key }));
      // Create table element
      const table = document.createElement('table');
      table.id = 'resultTable';
      table.classList.add('display');
      // Crear y agregar controles para guardar/cargar diseños antes de la tabla
      const designControls = document.createElement('div');
      designControls.id = 'designControls';
      designControls.innerHTML = `
        <input type="text" id="designName" placeholder="Nombre del diseño" />
        <button type="button" id="saveDesign">Guardar diseño</button>
        <label for="loadDesign">Cargar diseño:</label>
        <select id="loadDesign"></select>
        <button type="button" id="deleteDesign">Eliminar diseño</button>
      `;
      container.appendChild(designControls);
      container.appendChild(table);
      // Initialize DataTable
      if (dataTable) {
        dataTable.destroy();
      }
      dataTable = $('#resultTable').DataTable({
        data: data,
        columns: columns,
        scrollX: true,
        colReorder: true,
        // Activar la opción de redimensionar columnas mediante el plugin colResize
        // Configuración del plugin de redimensionamiento de columnas.  Se pasa un
        // objeto con la opción `isEnabled` para activar el plugin.
        colResize: { isEnabled: true },
        // Organizar los controles: Botones (B), menú de longitud (l), filtro de búsqueda (f),
        // resto de componentes (r, t, i, p). Esto sitúa el menú de longitud junto al botón de columnas.
        dom: 'Blfrtip',
        buttons: [
          {
            extend: 'colvis',
            columns: ':gt(0)',
            text: 'Seleccionar columnas'
          },
          {
            extend: 'excelHtml5',
            text: 'Exportar a Excel',
            title: 'Proyectos DataInnovación',
            exportOptions: {
              columns: ':visible'
            }
          }
        ],
        // Opciones para el tamaño de página. Se incluyen todas las opciones requeridas.
        lengthMenu: [[10, 25, 50, 100, 200], [10, 25, 50, 100, 200]],
        pageLength: 10,
        language: {
          url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json'
        }
      ,
        // Una vez inicializada la tabla, crear un selector de filtros en el encabezado
        // para cada columna. Esto permite filtrar directamente desde el encabezado
        // mostrando las opciones disponibles en el conjunto de datos.
        initComplete: function() {
          const api = this.api();
          // Añadir una fila adicional al thead para los filtros
          const $thead = $('#resultTable thead');
          const $filterRow = $('<tr class="filter-row"></tr>').appendTo($thead);
          api.columns().every(function() {
            const column = this;
            const $cell = $('<th></th>').appendTo($filterRow);
            // Crear el select y añadir opción por defecto
            const $select = $('<select><option value="">Todos</option></select>')
              .appendTo($cell)
              .on('change', function() {
                const val = $.fn.dataTable.util.escapeRegex($(this).val());
                column.search(val ? '^' + val + '$' : '', true, false).draw();
              });
            // Obtener valores únicos no vacíos de la columna y añadir al select
            const uniqueVals = column.data().unique().sort().toArray();
            uniqueVals.forEach(function(d) {
              if (d !== null && d !== undefined && d !== '') {
                $select.append('<option value="' + d + '">' + d + '</option>');
              }
            });
          });
        }
      });

      // Inicializar redimensionamiento de columnas si el plugin está disponible
      if ($.fn.dataTable && $.fn.dataTable.ColResize && dataTable) {
        try {
          // Crear una nueva instancia para permitir el arrastre
          new $.fn.dataTable.ColResize(dataTable);
        } catch (err) {
          console.error('No se pudo inicializar ColResize:', err);
        }
      }

      // Los filtros de región y sector se eliminan del panel superior.  Los valores de las
      // columnas pueden ser filtrados desde los selectores generados en el encabezado de la
      // tabla (creados en initComplete).

      // ========== Gestión de diseños guardados ==========
      // Controles y manejo para guardar, cargar y eliminar configuraciones de la tabla.
      const designNameInput = document.getElementById('designName');
      const loadDesignSelect = document.getElementById('loadDesign');
      const saveDesignBtn = document.getElementById('saveDesign');
      const deleteDesignBtn = document.getElementById('deleteDesign');

      // Cargar las opciones existentes desde localStorage y refrescar el selector
      function updateDesignOptions() {
        const designs = JSON.parse(localStorage.getItem('dataInnovacionDesigns') || '{}');
        loadDesignSelect.innerHTML = '';
        const defaultOpt = document.createElement('option');
        defaultOpt.value = '';
        defaultOpt.textContent = '--Seleccionar diseño--';
        loadDesignSelect.appendChild(defaultOpt);
        Object.keys(designs).forEach(name => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          loadDesignSelect.appendChild(opt);
        });
      }

      // Guardar un nuevo diseño o sobreescribir uno existente
      saveDesignBtn.addEventListener('click', () => {
        const name = (designNameInput.value || '').trim();
        if (!name) {
          alert('Ingrese un nombre para el diseño antes de guardarlo.');
          return;
        }
        const designs = JSON.parse(localStorage.getItem('dataInnovacionDesigns') || '{}');
        // Obtener estado actual de columnas: orden, visibilidad y anchos
        const order = dataTable.colReorder.order();
        const visible = dataTable.columns().visible().toArray();
        // Obtener anchos actuales de las columnas como números (sin px)
        const widths = $(dataTable.table().header()).find('th').map(function() {
          return $(this).outerWidth();
        }).get();
        const pageLength = dataTable.page.len();
        designs[name] = { order, visible, widths, pageLength };
        localStorage.setItem('dataInnovacionDesigns', JSON.stringify(designs));
        updateDesignOptions();
        alert('Diseño "' + name + '" guardado correctamente.');
      });

      // Cargar el diseño seleccionado
      loadDesignSelect.addEventListener('change', () => {
        const selected = loadDesignSelect.value;
        if (!selected) {
          return;
        }
        const designs = JSON.parse(localStorage.getItem('dataInnovacionDesigns') || '{}');
        const design = designs[selected];
        if (!design) {
          alert('El diseño seleccionado no existe.');
          return;
        }
        // Aplicar orden de columnas
        if (design.order && Array.isArray(design.order)) {
          dataTable.colReorder.order(design.order, true);
        }
        // Aplicar visibilidad de columnas
        if (design.visible && Array.isArray(design.visible)) {
          design.visible.forEach((vis, idx) => {
            dataTable.column(idx).visible(vis, false);
          });
        }
        // Aplicar anchos de columnas usando el plugin colResize
        if (design.widths && Array.isArray(design.widths)) {
          if (dataTable.colResize && typeof dataTable.colResize.restore === 'function') {
            dataTable.colResize.restore(design.widths);
          }
        }
        // Aplicar tamaño de página y redibujar
        if (design.pageLength) {
          dataTable.page.len(design.pageLength);
        }
        dataTable.draw(false);
      });

      // Eliminar el diseño seleccionado
      deleteDesignBtn.addEventListener('click', () => {
        const selected = loadDesignSelect.value;
        if (!selected) {
          alert('Seleccione un diseño para eliminar.');
          return;
        }
        const designs = JSON.parse(localStorage.getItem('dataInnovacionDesigns') || '{}');
        if (!designs[selected]) {
          alert('El diseño seleccionado no existe.');
          return;
        }
        if (!confirm('¿Está seguro de eliminar el diseño "' + selected + '"?')) {
          return;
        }
        delete designs[selected];
        localStorage.setItem('dataInnovacionDesigns', JSON.stringify(designs));
        updateDesignOptions();
        alert('Diseño eliminado.');
      });

      // Inicializar opciones al renderizar la tabla
      updateDesignOptions();
    }
  </script>
</body>
</html>
